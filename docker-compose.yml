# =============================================================================
# docker-compose.yml  (place in project root)
# Runs Mosquitto MQTT broker in a Docker container.
#
# Usage:
#   docker-compose up -d mosquitto      ← start broker only
#   docker-compose up -d                ← start everything
#   docker-compose logs -f mosquitto    ← watch broker logs
#   docker-compose down                 ← stop all
#
# If you prefer to install Mosquitto directly on the host machine, skip this
# file and follow the "Manual Install" instructions in MOSQUITTO_SETUP.md
# =============================================================================

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # MOSQUITTO MQTT BROKER
  # ---------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: cropsense_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"     # Plain MQTT  (ESP32 + Node.js backend)
      - "9001:9001"     # MQTT over WebSockets  (browser debug clients)
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - cropsense_network
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health/check", "-m", "ping", "-q", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # NODE.JS BACKEND
  # Uncomment if you also want to containerise the backend.
  # For local dev, running `node index.js` directly is simpler.
  # ---------------------------------------------------------------------------
  # backend:
  #   build: ./backend
  #   container_name: cropsense_backend
  #   restart: unless-stopped
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     - NODE_ENV=production
  #   env_file:
  #     - ./backend/.env
  #   depends_on:
  #     mosquitto:
  #       condition: service_healthy
  #   networks:
  #     - cropsense_network

# ---------------------------------------------------------------------------
# NAMED VOLUMES  — persists data across container restarts
# ---------------------------------------------------------------------------
volumes:
  mosquitto_data:
  mosquitto_log:

# ---------------------------------------------------------------------------
# NETWORK  — isolated bridge network for all DHARAA services
# ---------------------------------------------------------------------------
networks:
  cropsense_network:
    driver: bridge